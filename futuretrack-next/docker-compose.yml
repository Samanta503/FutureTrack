services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: futuretrack
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./mysql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  laravel:
    build:
      context: ..
      dockerfile: Dockerfile.laravel
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8001
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: futuretrack
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8001:8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      laravel:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: futuretrack
      DB_CONNECTION_LIMIT: 10
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api
      NODE_ENV: production
    ports:
      - "3002:3000"

volumes:
  mysql_data:
